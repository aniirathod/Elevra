services:
  # ==========================================================
  # NGINX Gateway (single backend URL)
  # ==========================================================
  - type: web
    name: elevra-backend
    env: docker
    dockerfilePath: ./infra/nginx/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SERVICE_HOST
        fromService:
          type: web
          name: auth-service
          property: host
      - key: RESUME_SERVICE_HOST
        fromService:
          type: web
          name: resume-service
          property: host
      - key: AI_SERVICE_HOST
        fromService:
          type: web
          name: ai-service
          property: host

  # ==========================================================
  # AUTH Service
  # ==========================================================
  - type: web
    name: auth-service
    env: docker
    dockerfilePath: ./services/auth/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4001

  # ==========================================================
  # RESUME Service
  # ==========================================================
  - type: web
    name: resume-service
    env: docker
    dockerfilePath: ./services/resume/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4002

  # ==========================================================
  # AI Service
  # ==========================================================
  - type: web
    name: ai-service
    env: docker
    dockerfilePath: ./services/ai/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4003
