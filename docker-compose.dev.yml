services:
  # Local MongoDB
  mongo:
    image: mongo:latest
    container_name: resumepro_mongo
    ports:
      - "27017:27017"
    volumes:
      - ./infra/docker/mongo-data:/data/db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - backend

  # Auth Service
  auth-service:
    build:
      context: ./apps/services/auth-service
    container_name: auth_service
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=development
      - PORT=4001
      - MONGO_URI=mongodb://admin:password@mongo:27017/dev?authSource=admin
      - JWT_ACCESS_SECRET=dev_secret
      - JWT_REFRESH_SECRET=dev_strong_secret
    volumes:
      - ./apps/services/auth-service/src:/app/src
    depends_on:
      - mongo
    networks:
      - backend

  # Resume Service
  resume-service:
    build: ./apps/services/resume-service
    container_name: resume_service
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=development
      - PORT=4002
      - MONGO_URI=mongodb://admin:password@mongo:27017/dev?authSource=admin
      - JWT_ACCESS_SECRET=dev_secret
      - JWT_REFRESH_SECRET=dev_strong_secret
    depends_on:
      - mongo
    networks:
      - backend

  # AI Service
  ai-service:
    build:
      context: ./apps/services/ai-service
    container_name: ai_service
    ports:
      - "4003:4003"
    environment:
      - NODE_ENV=development
      - PORT=4003
      - MONGO_URI=mongodb://admin:password@mongo:27017/dev?authSource=admin
    volumes:
      - ./apps/services/ai-service/src:/app/src
    depends_on:
      - mongo
    networks:
      - backend

  # 🌐 Frontend (Next.js)
  frontend:
    build:
      context: ./apps/frontend
    container_name: frontend_dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:80/api/v1
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - nginx
    networks:
      - backend
  # NGINX Gateway
  nginx:
    build: ./infra/nginx
    container_name: nginx_gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - resume-service
      - ai-service
    networks:
      - backend

volumes:
  mongo-data:

networks:
  backend:
    driver: bridge
