# infra/nginx/nginx.render.conf
# Optimized for Render's single container deployment

events {
    worker_connections 2048;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # MIME Types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=2r/m;

    # Upstream Services (localhost in single container)
    upstream auth_service {
        server 127.0.0.1:4001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream resume_service {
        server 127.0.0.1:4002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ai_service {
        server 127.0.0.1:4003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 8080;  # Render uses 8080 internally
        server_name _;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Content-Security-Policy "default-src 'self'" always;

        # CORS Configuration
        # NOTE: Update with your actual frontend domains
        set $cors_origin "";
        
        # Allow requests from Vercel preview/production deployments
        if ($http_origin ~* (^https://.*\.vercel\.app$|^https://yourapp\.com$|^http://localhost:3000$)) {
            set $cors_origin $http_origin;
        }
        
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 3600 always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ==========================================
        # Health Check Endpoint
        # ==========================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ==========================================
        # Metrics Endpoint (Internal Only)
        # ==========================================
        location /metrics {
            access_log off;
            allow 127.0.0.1;
            deny all;
            
            default_type application/json;
            return 200 '{"status":"operational","services":["auth","resume","ai"],"timestamp":"$time_iso8601"}';
        }

        # ==========================================
        # Auth Service Routes
        # ==========================================
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            limit_req_status 429;
            
            rewrite ^/api/auth/(.*) /$1 break;
            
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Cookie handling (JWT)
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ==========================================
        # Resume Service Routes
        # ==========================================
        location /api/resumes/ {
            limit_req zone=general_limit burst=30 nodelay;
            limit_req_status 429;
            
            rewrite ^/api/resumes/(.*) /$1 break;
            
            proxy_pass http://resume_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Cookie handling
            proxy_set_header Cookie $http_cookie;
            
            # File upload settings
            client_max_body_size 10M;
            client_body_buffer_size 128k;
            
            # Longer timeout for PDF processing
            proxy_connect_timeout 30s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;
            
            # Buffering for uploads
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # ==========================================
        # AI Service Routes
        # ==========================================
        location /api/ai/ {
            limit_req zone=ai_limit burst=3 nodelay;
            limit_req_status 429;
            
            rewrite ^/api/ai/(.*) /$1 break;
            
            proxy_pass http://ai_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Cookie handling
            proxy_set_header Cookie $http_cookie;
            
            # Very long timeout for LLM API calls
            proxy_connect_timeout 30s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
            
            # No buffering for streaming responses
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Custom error page
            error_page 429 = @ai_rate_limited;
        }

        # Rate limit error response for AI
        location @ai_rate_limited {
            default_type application/json;
            return 429 '{"error":"Too many AI analysis requests. Please wait 60 seconds before trying again.","retry_after":60,"code":"RATE_LIMIT_EXCEEDED"}';
        }

        # ==========================================
        # Security: Block sensitive paths
        # ==========================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.(env|git|svn|htaccess|log|config)$ {
            deny all;
            access_log off;
        }

        # ==========================================
        # Default: 404 for unknown routes
        # ==========================================
        location / {
            default_type application/json;
            return 404 '{"error":"Endpoint not found","code":"NOT_FOUND"}';
        }
    }
}