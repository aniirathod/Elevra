events {
   worker_connections 1024;
}

http {
  server {
    listen 80;
    server_name _;

    # Basic security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header X-XSS-Protection "1; mode=block";

    # gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml;

    # Health
    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # API proxy rules
    location /api/v1/auth/ {
      proxy_pass http://$AUTH_SERVICE_HOST/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    location /api/v1/resume/ {
      proxy_pass http://$RESUME_SERVICE_HOST/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/ai/ {
      proxy_pass http://$AI_SERVICE_HOST/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Fallback
    location / {
      return 404 'Not found';
    }
  }
}
